<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quotely</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="title"><strong>Quotely</strong></div>
    <div class="feed-window">
        {% for post in posts %}
                <div class="img-text-message" id="post-{{ post.id }}">
                    <!--<p class="Title-message">
                        {{ post.title }}
                        <br> 
                    </p>-->
                    <form method="POST" class="Title-message">
                        <button type="submit" name="action" value="OpenPost.id = {{ post.id }}" class="Title-message">
                            <img src="/static/icons/quotationmark-removebg-preview.png" alt="" class="Title-message" width="100px">
                        </button>
                    </form>

                    <p class="Content-message">
                        {{ post.content }}
                    </p>
                    <div class="message-text-container">
                        <form method="POST">
                            <button type="submit" name="action" value="post.id = {{ post.id }}" class="Username-message">
                        </form>
                        <img src="{{ users[loop.index0].profilePicture }}" alt="" class="profile-picture-message">
                        @{{ users[loop.index0].username }} 
                    </button>
                    </div>

                    <form method="POST" class="like-button">
                    <input type="hidden" name="post_id" value="{{ post.id }}" class="like-button">
                    <button type="submit" name="action" value="give_like" class="like-button">
                        ❤️ {{ post.likers|length }}
                    </button>
                    </form>
                </div>
            {% endfor %}
    </div>

    <section class="account-symbol">
        <form action="" method="POST">
            <button class="profilePicture-small" name="action" value="open_settings" type="submit">
                <img src="{{ session_user.profilePicture }}" alt="" class="profilePicture-small">
            </button>
        </form>
    </section>
</body>
